name: Vietlott Daily Bot

on:
  schedule:
    # Gửi PICKS trước giờ quay (7:00 SA giờ VN = 0:00 UTC)
    - cron: "0 0 * * *"
    # Gửi KẾT QUẢ sau giờ quay Mega/Max3D+ (11:30 SA VN = 4:30 UTC) — Lotto 5/35 buổi sáng
    - cron: "30 4 * * *"
    # Gửi KẾT QUẢ sau 18:00 quay (11:30 tối VN = 11:30 UTC)
    - cron: "30 11 * * *"
    # Gửi KẾT QUẢ sau 21:00 quay Lotto 5/35 (14:30 UTC)
    - cron: "30 14 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: picks / results'
        required: false
        default: 'picks'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: data/
          key: vietlott-data-${{ github.run_number }}
          restore-keys: |
            vietlott-data-

      - name: Scrape latest results
        run: python scraper_live.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Run analysis & send Telegram
        run: python main.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_HOUR: ${{ github.event.schedule }}

      - name: Save updated data
        uses: actions/cache/save@v4
        with:
          path: data/
          key: vietlott-data-${{ github.run_number }}
