name: Vietlott Daily Bot

on:
  schedule:
    # Chạy mỗi 10 phút từ 0:00 UTC đến 15:00 UTC (tức 7:00 SA - 22:00 tối VN)
    - cron: "0/10 0-15 * * *"
  workflow_dispatch:   # Cho phép chạy thủ công

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas

      - name: Restore data cache (picks + sent_results + history)
        uses: actions/cache@v4
        with:
          path: data/
          key: vietlott-data-${{ github.run_number }}
          restore-keys: |
            vietlott-data-

      - name: Run bot (scrape + detect new + send Telegram)
        run: python main.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Save updated data cache
        uses: actions/cache/save@v4
        with:
          path: data/
          key: vietlott-data-${{ github.run_number }}
